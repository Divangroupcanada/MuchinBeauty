name: Fetch Instagram Photos
on:
  workflow_dispatch:
  push:
    paths:
      - 'scripts/ig-photos.json'
      - 'scripts/fetch-ig.mjs'
      - '.github/workflows/fetch-instagram.yml'
permissions:
  contents: write
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/fetch-ig.mjs
      - name: Commit downloaded images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add MuchinBeauty-files-for-github-upload/ig || true
          git commit -m "Add Instagram photos [skip ci]" || echo "nothing to commit"
          git push
